<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Verragio Pricing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brown: #953B01;
      --brown-dim: rgba(149,59,1,0.15);
      --black: #0A0A0A;
      --white: #FFFFFF;
      --off: #F7F4F0;
      --mid: #888;
      --rule: rgba(0,0,0,0.08);
    }

    html, body {
      min-height: 100%;
      background: var(--off);
      font-family: 'Montserrat', sans-serif;
      color: var(--black);
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ── */
    .header {
      background: var(--black);
      padding: 0 40px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-logo {
      height: 36px;
      width: auto;
    }

    .header-label {
      font-size: 8px;
      letter-spacing: 0.3em;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
    }

    /* ── HERO ── */
    .hero {
      background: var(--black);
      padding: 56px 40px 64px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 100%, rgba(149,59,1,0.18) 0%, transparent 65%);
      pointer-events: none;
    }

    .hero-eyebrow {
      font-size: 9px;
      letter-spacing: 0.35em;
      color: var(--brown);
      text-transform: uppercase;
      margin-bottom: 16px;
      font-weight: 400;
    }

    .hero-title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(36px, 6vw, 60px);
      color: var(--white);
      letter-spacing: 0.08em;
      line-height: 1;
      margin-bottom: 8px;
    }

    .hero-title em {
      font-style: normal;
      color: var(--brown);
    }

    .hero-sub {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
      margin-bottom: 40px;
    }

    /* ── SEARCH ── */
    .search-wrap {
      position: relative;
      max-width: 520px;
      margin: 0 auto;
    }

    .search-input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 3px;
      padding: 16px 52px 16px 20px;
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      letter-spacing: 0.08em;
      color: var(--white);
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    .search-input::placeholder { color: rgba(255,255,255,0.25); }

    .search-input:focus {
      border-color: var(--brown);
      background: rgba(255,255,255,0.09);
    }

    .search-icon {
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.3);
      pointer-events: none;
    }

    /* ── FILTERS ── */
    .filters-bar {
      padding: 20px 40px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--rule);
      background: var(--white);
    }

    .filter-label {
      font-size: 8px;
      letter-spacing: 0.28em;
      color: var(--mid);
      text-transform: uppercase;
      margin-right: 4px;
      flex-shrink: 0;
    }

    .filter-btn {
      background: none;
      border: 1px solid #ddd;
      border-radius: 100px;
      padding: 5px 14px;
      font-family: 'Montserrat', sans-serif;
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #666;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover { border-color: var(--brown); color: var(--brown); }

    .filter-btn.active {
      background: var(--black);
      border-color: var(--black);
      color: var(--white);
    }

    /* ── MAIN ── */
    .main {
      padding: 32px 40px 60px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .results-meta {
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--mid);
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    .results-meta span { color: var(--black); font-weight: 500; }

    /* ── GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 2px;
    }

    .card {
      background: var(--white);
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.12);
      z-index: 2;
    }

    .card-img {
      width: 100%;
      aspect-ratio: 1;
      background: #F8F6F3;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .card-img img {
      width: 85%;
      height: 85%;
      object-fit: contain;
      transition: transform 0.4s ease;
    }

    .card:hover .card-img img { transform: scale(1.05); }

    .card-no-img {
      width: 100%;
      aspect-ratio: 1;
      background: #F0EDE8;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-no-img-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 300;
      color: rgba(149,59,1,0.25);
      letter-spacing: 0.05em;
      text-align: center;
      padding: 8px;
      line-height: 1.1;
    }

    .card-body {
      padding: 14px 16px 16px;
      border-top: 2px solid transparent;
      transition: border-color 0.2s;
    }

    .card:hover .card-body { border-color: var(--brown); }

    .card-collection {
      font-size: 8px;
      letter-spacing: 0.25em;
      color: var(--brown);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .card-sku {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      font-weight: 400;
      letter-spacing: 0.04em;
      color: var(--black);
      margin-bottom: 10px;
      line-height: 1;
    }

    .card-prices {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .card-price {
      font-size: 9px;
      letter-spacing: 0.1em;
      color: #666;
      background: var(--off);
      padding: 3px 8px;
      border-radius: 2px;
    }

    .card-price strong {
      color: var(--black);
      font-weight: 500;
    }

    /* ── EMPTY STATE ── */
    .empty {
      text-align: center;
      padding: 80px 20px;
      display: none;
    }

    .empty-icon {
      font-size: 40px;
      margin-bottom: 16px;
      opacity: 0.3;
    }

    .empty-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 24px;
      font-weight: 300;
      color: var(--black);
      margin-bottom: 8px;
    }

    .empty-sub {
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--mid);
      text-transform: uppercase;
    }

    /* ── LOADING ── */
    .loading {
      text-align: center;
      padding: 80px;
      font-size: 9px;
      letter-spacing: 0.3em;
      color: var(--mid);
      text-transform: uppercase;
    }

    @media (max-width: 600px) {
      .header { padding: 0 20px; }
      .hero { padding: 40px 20px 48px; }
      .filters-bar { padding: 16px 20px; }
      .main { padding: 24px 20px 48px; }
      .grid { grid-template-columns: repeat(2, 1fr); gap: 2px; }
    }
  </style>
</head>
<body>

  <header class="header">
    <img class="header-logo" src="https://verragio.stockpress.co/l/27c469bd2adc2e09/Group+1.svg" alt="Verragio" />
    <div class="header-label">Authorized Retailer Portal</div>
  </header>

  <div class="hero">
    <div class="hero-eyebrow">Retail Partner Pricing</div>
    <div class="hero-title">Style <em>Reference</em></div>
    <div class="hero-sub">2,804 Styles · Updated 2025</div>
    <div class="search-wrap">
      <input class="search-input" id="searchInput" type="text" placeholder="Search by style number or collection..." autocomplete="off" />
      <svg class="search-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
    </div>
  </div>

  <div class="filters-bar">
    <span class="filter-label">Collection</span>
    <button class="filter-btn active" data-collection="ALL">All</button>
    <button class="filter-btn" data-collection="VENETIAN">Venetian</button>
    <button class="filter-btn" data-collection="PARISIAN">Parisian</button>
    <button class="filter-btn" data-collection="INSIGNIA">Insignia</button>
    <button class="filter-btn" data-collection="COUTURE">Couture</button>
    <button class="filter-btn" data-collection="RENAISSANCE">Renaissance</button>
    <button class="filter-btn" data-collection="ETERNA">Eterna</button>
    <button class="filter-btn" data-collection="LUMINO">Lumino</button>
    <button class="filter-btn" data-collection="CLASSICO">Classico</button>
    <button class="filter-btn" data-collection="EUR">European</button>
    <button class="filter-btn" data-collection="MENS">Men's</button>
    <button class="filter-btn" data-collection="CLASSIC">Classic</button>
    <button class="filter-btn" data-collection="TRADITION">Tradition</button>
    <button class="filter-btn" data-collection="PARADISO">Paradiso</button>
    <button class="filter-btn" data-collection="VANGUARD B.">Vanguard</button>
  </div>

  <div class="main">
    <div class="results-meta" id="resultsMeta"></div>
    <div class="loading" id="loading">Loading styles…</div>
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty">
      <div class="empty-icon">◇</div>
      <div class="empty-title">No styles found</div>
      <div class="empty-sub">Try a different search or filter</div>
    </div>
  </div>

  <script>
    const BASE_URL = '';  // same origin — pages live in same folder
    let ALL_STYLES = [];
    let activeCollection = 'ALL';
    let searchQuery = '';

    function fmt(p) {
      const n = parseFloat(p);
      if (!p || isNaN(n)) return null;
      return '$' + Math.round(n).toLocaleString();
    }

    function colLabel(c) {
      if (!c || c.trim() === '' || c.trim().toUpperCase() === 'NA') return '';
      return c.trim().charAt(0).toUpperCase() + c.trim().slice(1).toLowerCase() + ' Collection';
    }

    function parseCSV(text) {
      const lines = text.trim().split('\n');
      const headers = lines[0].split(',').map(h => h.trim().replace(/^\uFEFF/, ''));
      const rows = [];
      for (let i = 1; i < lines.length; i++) {
        const vals = lines[i].split(',');
        const row = {};
        headers.forEach((h, idx) => row[h] = (vals[idx] || '').trim());
        rows.push(row);
      }
      return rows;
    }

    function buildStyles(rows) {
      const map = {};
      for (const r of rows) {
        const s = r.StyleNumber;
        if (!s) continue;
        const metal = (r.METAL || '').toUpperCase();
        if (!map[s]) {
          map[s] = {
            style: s,
            collection: r.Collection || '',
            tw: r.TotalWeight || '',
            attribute: r.ATTRIBUTE || '0',
            imageURL: r.ImageURL || '',
            '14KT': '', '18KT': '', 'PLAT': ''
          };
        }
        if (metal) map[s][metal] = r.PRICE;
      }
      return Object.values(map);
    }

    function renderCard(s) {
      const url = `${BASE_URL}${s.style}.html`;
      const col = colLabel(s.collection);
      const p14 = fmt(s['14KT']);
      const p18 = fmt(s['18KT']);
      const pPl = fmt(s['PLAT']);
      const hasImg = s.imageURL && s.imageURL.trim() !== '' && s.imageURL.trim().toLowerCase() !== 'nan';

      const imgHtml = hasImg
        ? `<div class="card-img"><img src="${s.imageURL.trim()}" alt="${s.style}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\'card-no-img\'><div class=\'card-no-img-text\'>${s.style}</div></div>'" /></div>`
        : `<div class="card-no-img"><div class="card-no-img-text">${s.style}</div></div>`;

      const prices = [
        p14 ? `<span class="card-price">14K <strong>${p14}</strong></span>` : '',
        p18 ? `<span class="card-price">18K <strong>${p18}</strong></span>` : '',
        pPl ? `<span class="card-price">PLAT <strong>${pPl}</strong></span>` : '',
      ].filter(Boolean).join('');

      return `<a class="card" href="${url}">
        ${imgHtml}
        <div class="card-body">
          ${col ? `<div class="card-collection">${col}</div>` : ''}
          <div class="card-sku">${s.style}</div>
          <div class="card-prices">${prices}</div>
        </div>
      </a>`;
    }

    function render() {
      const q = searchQuery.toLowerCase().trim();
      let filtered = ALL_STYLES;

      if (activeCollection !== 'ALL') {
        filtered = filtered.filter(s => (s.collection || '').toUpperCase() === activeCollection);
      }

      if (q) {
        filtered = filtered.filter(s =>
          s.style.toLowerCase().includes(q) ||
          (s.collection || '').toLowerCase().includes(q)
        );
      }

      const grid = document.getElementById('grid');
      const meta = document.getElementById('resultsMeta');
      const empty = document.getElementById('empty');

      if (filtered.length === 0) {
        grid.innerHTML = '';
        empty.style.display = 'block';
        meta.innerHTML = '';
      } else {
        empty.style.display = 'none';
        // Show max 200 results for performance
        const shown = filtered.slice(0, 200);
        grid.innerHTML = shown.map(renderCard).join('');
        meta.innerHTML = `Showing <span>${shown.length.toLocaleString()}</span> of <span>${filtered.length.toLocaleString()}</span> styles`;
      }
    }

    // Load CSV
    async function init() {
      try {
        const res = await fetch('Price_Sheet.csv');
        const text = await res.text();
        const rows = parseCSV(text);
        ALL_STYLES = buildStyles(rows);
        document.getElementById('loading').style.display = 'none';
        document.getElementById('resultsMeta').style.display = '';
        render();
      } catch(e) {
        document.getElementById('loading').textContent = 'Error loading data.';
      }
    }

    // Search
    document.getElementById('searchInput').addEventListener('input', e => {
      searchQuery = e.target.value;
      render();
    });

    // Filters
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeCollection = btn.dataset.collection;
        render();
      });
    });

    init();
  </script>
</body>
</html>
